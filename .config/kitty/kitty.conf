# BEGIN_KITTY_THEME
# Afterglow
# include current-theme.conf
include ansi-tty-theme.conf
# END_KITTY_THEME
# For themes
# Midsummer Night, Catpuccin Mocha, Doom Vibrant, Misterioso, Neutron, Nightfox,
# Relaxed Afterglow, Snazzy, Tokyo Night, Tomorrow Night, Tomorrow Night Eighties,
# vague kitty, Wild Cherry
# for fonts-
# grep through fc-list
# fira code, CaskaydiaCove Nerd Font Mono 
# CaskaydiaMono Nerd Font Mono
font_family family="IosevkaTerm Nerd Font Mono" style=Regular
bold_font family="IosevkaTerm Nerd Font Mono" style=Bold
italic_font family="IosevkaTerm Nerd Font Mono" style=Italic
bold_italic_font family="IosevkaTerm Nerd Font Mono" style="Bold Italic"
modify_font cell_width 110%
modify_font cell_height -2px
font_features IosevkaTermNFM cv10=6
disable_ligatures always
confirm_os_window_close 0
enable_audio_bell no
sync_to_monitor yes
wayland_titlebar_color background
hide_window_decorations yes
