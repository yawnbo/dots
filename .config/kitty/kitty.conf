# BEGIN_KITTY_THEME
# Afterglow
# include current-theme.conf
include ansi-tty-theme.conf
# END_KITTY_THEME
# For themes
# Midsummer Night, Catpuccin Mocha, Doom Vibrant, Misterioso, Neutron, Nightfox,
# Relaxed Afterglow, Snazzy, Tokyo Night, Tomorrow Night, Tomorrow Night Eighties,
# vague kitty, Wild Cherry
# for fonts-
# grep through fc-list
# fira code, CaskaydiaCove Nerd Font Mono 
# CaskaydiaMono Nerd Font Mono
font_family family="IosevkaTerm Nerd Font Mono,IosevkaTerm NFM"
disable_ligatures always
confirm_os_window_close 0
enable_audio_bell no
sync_to_monitor yes
wayland_titlebar_color background
hide_window_decorations yes
